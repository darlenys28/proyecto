<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TechStore</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #333;
    }

    /* HEADER */
    header {
      background: #111;
      color: white;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h2 {
      margin: 0;
      font-size: 20px;
    }

    .icon {
      font-size: 18px;
      cursor: pointer;
    }

    /* SEARCH */
    .search {
      padding: 12px;
      background: white;
    }

    .search input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      outline: none;
    }

    /* CATEGORIES */
    .categories {
      display: flex;
      gap: 10px;
      padding: 10px;
      overflow-x: auto;
    }

    .category {
      padding: 8px 14px;
      border-radius: 20px;
      background: #e3e8ff;
      color: #2979ff;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    .category:hover {
      background: #2979ff;
      color: white;
    }

    /* PRODUCTS */
    .products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 15px;
      padding-bottom: 70px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
    }

    .card h4 {
      margin: 10px 0 5px;
      font-size: 15px;
    }

    .price {
      font-weight: bold;
      color: #00c853;
      margin-bottom: 8px;
    }

    .card button {
      width: 100%;
      padding: 8px;
      background: #2979ff;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .card button:hover {
      background: #1c54b2;
    }

    /* FOOTER NAV */
    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #ddd;
    }

    footer div {
      text-align: center;
      font-size: 12px;
      color: #555;
      cursor: pointer;
    }

    footer div:hover {
      color: #2979ff;
    }
  </style>
</head>

<body>

<header>
  <span class="icon">☰</span>
  <h2>TechStore</h2>
  <span class="icon">🛒</span>
</header>

<div class="search">
  <input type="text" placeholder="Buscar teléfonos, laptops...">
</div>

<div class="categories">
  <div class="category">📱 Teléfonos</div>
  <div class="category">💻 Laptops</div>
  <div class="category">🎧 Accesorios</div>
</div>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>iPhone 15</h4>
    <div class="price">€999</div>
    <button>Añadir</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>Samsung S23</h4>
    <div class="price">€899</div>
    <button>Añadir</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>HP Pavilion</h4>
    <div class="price">€750</div>
    <button>Añadir</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h4>Lenovo IdeaPad</h4>
    <div class="price">€680</div>
    <button>Añadir</button>
  </div>

</div>

<footer>
  <div>🏠<br>Inicio</div>
  <div>🔍<br>Buscar</div>
  <div>🛒<br>Carrito</div>
  <div>👤<br>Perfil</div>
</footer>

</body>
</html>
